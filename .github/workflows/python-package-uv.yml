# Install Poetry, dependencies, run tests with a range of Python versions on Ubuntu Linux
name: Python package with uv

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python version ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the project and locked dependencies
        run: uv sync --locked  # Includes `dev` group by default

      - name: Run tests
        run: uv run pytest .

      - name: Check format with ruff
        # Exit with error if the code is not properly formatted
        run: uv run ruff format --check --diff

      - name: Check linting with ruff
        # Exit with error if the code has issues
        run: uv run ruff check --output-format github

      - name: Check typing
        run: uv run mypy .
